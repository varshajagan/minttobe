<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cone Ice Cream - Mint To Be</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.cone-header{
    background: linear-gradient(to right,#f7971e,#ffd200);
    padding:60px 0;
    color:white;
}

.card img{
    height:230px;
    object-fit:cover;
}

.card:hover{
    transform: scale(1.05);
    transition:0.3s;
}

.cart-box{
    background:#fff;
    border-radius:15px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- 🔴 NAVBAR -->
<nav class="navbar navbar-dark bg-danger px-3">
    <a class="navbar-brand fw-bold text-white" href="index.html">Mint To Be</a>
</nav>

<!-- HEADER -->
<section class="cone-header text-center">
    <h1 class="fw-bold">Cone Ice Cream Varieties</h1>
    <p class="lead">Crispy cone with delicious scoops</p>
</section>

<!-- 🛒 CART -->
<div class="container mt-4">
    <div class="cart-box">
        <h4>🛒 Your Order</h4>
        <ul id="cartList"></ul>
        <h5 id="total">Total: ₹0</h5>

        <button class="btn btn-success w-100" onclick="placeOrder()">Place Order</button>
        <div id="orderMessage" class="mt-3 text-center"></div>
    </div>
</div>

<!-- 🍦 ITEMS -->
<div class="container mt-5">
    <div class="row" id="coneList"></div>
</div>

<script>
const cones = [
    { name:"Chocolate Cone", price:90, img:"chocolate cone.png", desc:"Rich chocolate scoop"},
    { name:"Vanilla Cone", price:85, img:"vanilla cone.png", desc:"Classic smooth vanilla"},
    { name:"Strawberry Cone", price:88, img:"strawberry cone.png", desc:"Fresh strawberry delight"},
    { name:"Butterscotch Cone", price:95, img:"butter cone.png", desc:"Sweet caramel crunch"},
    { name:"Mango Cone", price:90, img:"mango cone.png", desc:"Fresh mango flavor"},
    { name:"Rainbow Cone", price:100, img:"rainbow cone.png", desc:"Colorful multi-flavor scoop"}
];

let cart = [];

const container = document.getElementById("coneList");

cones.forEach((item,index)=>{
    container.innerHTML += `
    <div class="col-md-4 mb-4">
        <div class="card shadow text-center p-2">
            <img src="${item.img}">
            <div class="card-body">
                <h5>${item.name}</h5>
                <p>${item.desc}</p>
                <h6 class="text-danger">₹${item.price}</h6>
                <button class="btn btn-danger" onclick="addToCart(${index})">
                    Add to Cart
                </button>
            </div>
        </div>
    </div>`;
});

function addToCart(index){
    let item = cones[index];
    let existing = cart.find(i => i.name === item.name);

    if(existing){
        existing.qty++;
    } else {
        cart.push({...item, qty:1});
    }

    updateCart();
}

function updateCart(){
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item=>{
        let price = item.price * item.qty;
        total += price;

        list.innerHTML += `
            <li>${item.name} × ${item.qty} = ₹${price}</li>
        `;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

function placeOrder(){
    let box = document.getElementById("orderMessage");

    if(cart.length === 0){
        box.innerHTML = "<span class='text-danger'>⚠️ Cart is empty!</span>";
        return;
    }

    let total = 0;
    let summary = "<h5>✅ Order Placed!</h5><ul>";

    cart.forEach(item=>{
        let price = item.price * item.qty;
        total += price;

        summary += `<li>${item.name} × ${item.qty} = ₹${price}</li>`;
    });

    summary += `</ul><h6>Total: ₹${total}</h6>`;
    summary += `<p class='text-success'>🎉 Thank you for your order!</p>`;

    box.innerHTML = summary;

    // clear cart
    cart = [];
    updateCart();
}
</script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
