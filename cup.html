<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cup Ice Cream - Mint To Be</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.cup-header{
    background: linear-gradient(to right,#ff9966,#ff5e62);
    padding:60px 0;
    color:white;
}

.card img{
    height:230px;
    object-fit:cover;
}

.card:hover{
    transform: scale(1.05);
    transition:0.3s;
}

.cart-box{
    background:#fff;
    border-radius:15px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-danger px-3">
    <a class="navbar-brand fw-bold text-white">Mint To Be</a>
</nav>

<section class="cup-header text-center">
    <h1>Cup Ice Cream Varieties</h1>
</section>

<!-- CART -->
<div class="container mt-4">
    <div class="cart-box">
        <h4>🛒 Your Order</h4>
        <ul id="cartList"></ul>
        <h5 id="total">Total: ₹0</h5>

        <button class="btn btn-success w-100" onclick="placeOrder()">Place Order</button>
        <div id="orderMessage" class="mt-3 text-center"></div>
    </div>
</div>

<!-- ITEMS -->
<div class="container mt-5">
    <div class="row" id="cupList"></div>
</div>

<script>
const cups = [
    { name:"Chocolate Cup", price:80, img:"chocolate cup.png", desc:"Rich chocolate delight"},
    { name:"Vanilla Cup", price:70, img:"vanilla cup.png", desc:"Classic smooth vanilla"},
    { name:"Strawberry Cup", price:75, img:"strawberry cup.png", desc:"Fresh fruity flavor"},
    { name:"Butterscotch Cup", price:85, img:"butter cup.png", desc:"Sweet caramel crunch"},
    { name:"Mango Cup", price:75, img:"mango cup.png", desc:"Fresh mango taste"},
    { name:"Black Forest Cup", price:90, img:"black forest cup.png", desc:"Chocolate & cherry mix"}
];

let cart = [];

const container = document.getElementById("cupList");

cups.forEach((item,index)=>{
    container.innerHTML += `
    <div class="col-md-4 mb-4">
        <div class="card shadow text-center p-2">
            <img src="${item.img}">
            <div class="card-body">
                <h5>${item.name}</h5>
                <p>${item.desc}</p>
                <h6 class="text-danger">₹${item.price}</h6>
                <button class="btn btn-danger" onclick="addToCart(${index})">Add to Cart</button>
            </div>
        </div>
    </div>`;
});

function addToCart(index){
    let item = cups[index];
    let existing = cart.find(i=>i.name===item.name);

    if(existing) existing.qty++;
    else cart.push({...item, qty:1});

    updateCart();
}

function updateCart(){
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item=>{
        let price = item.price * item.qty;
        total += price;
        list.innerHTML += `<li>${item.name} × ${item.qty} = ₹${price}</li>`;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

function placeOrder(){
    let box = document.getElementById("orderMessage");

    if(cart.length===0){
        box.innerHTML = "<span class='text-danger'>Cart is empty!</span>";
        return;
    }

    let total = 0;
    let summary = "<h5>Order Placed!</h5><ul>";

    cart.forEach(item=>{
        let price = item.price * item.qty;
        total += price;
        summary += `<li>${item.name} × ${item.qty} = ₹${price}</li>`;
    });

    summary += `</ul><h6>Total: ₹${total}</h6><p class='text-success'>Thank you!</p>`;

    box.innerHTML = summary;

    cart = [];
    updateCart();
}
</script>

</body>
</html>
