<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kulfi Varieties - Mint To Be</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.kulfi-header{
    background: linear-gradient(to right,#ff758c,#ff7eb3);
    padding:60px 0;
    color:white;
}

.card img{
    height:230px;
    object-fit:cover;
}

.card:hover{
    transform: scale(1.05);
    transition:0.3s;
}

.cart-box{
    background:#fff;
    border-radius:15px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-danger px-3">
    <a class="navbar-brand fw-bold text-white">Mint To Be</a>
</nav>

<section class="kulfi-header text-center">
    <h1>Kulfi Varieties</h1>
</section>

<!-- CART -->
<div class="container mt-4">
    <div class="cart-box">
        <h4>🛒 Your Order</h4>
        <ul id="cartList"></ul>
        <h5 id="total">Total: ₹0</h5>

        <button class="btn btn-success w-100" onclick="placeOrder()">Place Order</button>
        <div id="orderMessage" class="mt-3 text-center"></div>
    </div>
</div>

<!-- ITEMS -->
<div class="container mt-5">
    <div class="row" id="kulfiList"></div>
</div>

<script>
const kulfis = [
    { name:"Malai Kulfi", price:60, img:"malai kulfi.jpg", desc:"Creamy traditional flavor"},
    { name:"Pista Kulfi", price:70, img:"pista kulfi.jpg", desc:"Rich pistachio flavor"},
    { name:"Mango Kulfi", price:65, img:"https://t3.ftcdn.net/jpg/18/78/02/16/240_F_1878021673_kBmiL7C7Zs2HWESdw8OpOFH7kxEcEVPk.jpg", desc:"Fresh mango sweetness"},
    { name:"Chocolate Kulfi", price:75, img:"https://sinfullyspicy.com/wp-content/uploads/2022/05/1-4.jpg", desc:"Chocolate lovers special"},
    { name:"Badam Kulfi", price:80, img:"badam kulfi.jpg", desc:"Almond rich delight"},
    { name:"Kesar Kulfi", price:85, img:"kesar kulfi.png", desc:"Saffron flavored treat"}
];

let cart = [];

const container = document.getElementById("kulfiList");

kulfis.forEach((item,index)=>{
    container.innerHTML += `
    <div class="col-md-4 mb-4">
        <div class="card shadow text-center p-2">
            <img src="${item.img}">
            <div class="card-body">
                <h5>${item.name}</h5>
                <p>${item.desc}</p>
                <h6 class="text-danger">₹${item.price}</h6>
                <button class="btn btn-danger" onclick="addToCart(${index})">Add to Cart</button>
            </div>
        </div>
    </div>`;
});

function addToCart(index){
    let item = kulfis[index];
    let existing = cart.find(i=>i.name===item.name);

    if(existing) existing.qty++;
    else cart.push({...item, qty:1});

    updateCart();
}

function updateCart(){
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item=>{
        let price = item.price * item.qty;
        total += price;
        list.innerHTML += `<li>${item.name} × ${item.qty} = ₹${price}</li>`;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

function placeOrder(){
    let box = document.getElementById("orderMessage");

    if(cart.length===0){
        box.innerHTML = "<span class='text-danger'>Cart is empty!</span>";
        return;
    }

    let total = 0;
    let summary = "<h5>Order Placed!</h5><ul>";

    cart.forEach(item=>{
        let price = item.price * item.qty;
        total += price;
        summary += `<li>${item.name} × ${item.qty} = ₹${price}</li>`;
    });

    summary += `</ul><h6>Total: ₹${total}</h6><p class='text-success'>Thank you!</p>`;

    box.innerHTML = summary;

    cart = [];
    updateCart();
}
</script>

</body>
</html>
