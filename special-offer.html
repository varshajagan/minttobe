<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Offers - Mint To Be</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(120deg,#fff,#ffe4ec);
}

/* HEADER */
.offer-header{
    background: linear-gradient(135deg,#ff6f91,#ff9671);
    padding:80px 20px;
    color:white;
    text-align:center;
}

/* CARD */
.offer-card{
    border-radius:20px;
    transition:0.3s;
}
.offer-card:hover{
    transform:translateY(-10px);
}

/* CART */
.cart-box{
    background:#fff;
    border-radius:15px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- 🔴 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger px-3">

  <a class="navbar-brand fw-bold text-white" href="index.html">Mint To Be</a>

  <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    
    <ul class="navbar-nav ms-auto align-items-center">

      <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="contact.html">Contact</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="order.html">Order</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="variety.html">Variety</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="special-offer.html">Offers</a></li>

      <!-- 🔍 SEARCH -->
      <li class="nav-item ms-3">
        <div class="d-flex">
          <input type="text" id="searchBox" class="form-control form-control-sm me-2" placeholder="Search...">
          <button class="btn btn-light btn-sm">🔍</button>
        </div>
      </li>

      <!-- 🛒 CART ICON -->
      <li class="nav-item ms-3">
        <button class="btn btn-light position-relative" onclick="toggleCart()">
          🛒
          <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge bg-danger">0</span>
        </button>
      </li>

    </ul>
  </div>
</nav>

<!-- HEADER -->
<section class="offer-header">
    <h1>Special Offers</h1>
    <p>Grab exciting deals</p>
</section>

<!-- 🛒 CART -->
<div class="container mt-4">
    <div class="cart-box">
        <h4>🛒 Your Order</h4>
        <ul id="cartList"></ul>
        <h5 id="total">Total: ₹0</h5>

        <button class="btn btn-success w-100" onclick="placeOrder()">Place Order</button>
        <div id="msg" class="mt-3 text-center"></div>
    </div>
</div>

<!-- OFFERS -->
<div class="container mt-5">
    <div class="row" id="offerList"></div>
</div>

<script>
const offers = [
    {title:"Buy 1 Get 1 Free", price:60, img:"mangomalai.jpg"},
    {title:"20% OFF", price:80, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSeD6sv7qfQ8w92b7sjBvPztivLzL_ovffTHw&s=10"},
    {title:"Family Pack", price:250, img:"family pack.jpg"},
    {title:"Weekend Offer", price:120, img:"cupcream.jpg"}
];

let cart = [];

const container = document.getElementById("offerList");

offers.forEach((item,index)=>{
    container.innerHTML += `
    <div class="col-md-4 mb-4">
        <div class="card offer-card shadow text-center p-2">
            <img src="${item.img}" style="height:220px;object-fit:cover;">
            <div class="card-body">
                <h5>${item.title}</h5>
                <h6 class="text-danger">₹${item.price}</h6>
                <button class="btn btn-danger" onclick="addToCart(${index})">
                    Order Now
                </button>
            </div>
        </div>
    </div>`;
});

function addToCart(index){
    let item = offers[index];
    let exist = cart.find(i=>i.title===item.title);

    if(exist){
        exist.qty++;
    } else {
        cart.push({...item, qty:1});
    }

    updateCart();
}

function updateCart(){
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item=>{
        let price = item.price * item.qty;
        total += price;

        list.innerHTML += `<li>${item.title} × ${item.qty} = ₹${price}</li>`;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

function placeOrder(){
    let box = document.getElementById("msg");

    if(cart.length===0){
        box.innerHTML = "<span class='text-danger'>⚠️ Cart empty</span>";
        return;
    }

    let total = 0;
    let text = "<h5>✅ Order Placed</h5><ul>";

    cart.forEach(item=>{
        let price = item.price * item.qty;
        total += price;
        text += `<li>${item.title} × ${item.qty}</li>`;
    });

    text += `</ul><h6>Total: ₹${total}</h6>`;
    text += `<p class='text-success'>🎉 Thank you!</p>`;

    box.innerHTML = text;

    cart = [];
    updateCart();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
