<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mint To Be - Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(120deg,#fff,#ffe4ec);
}

/* HERO */
.hero{
    background: linear-gradient(135deg,#ff6f91,#ff9671);
    color:white;
    padding:80px 20px;
    text-align:center;
}

/* FORM BOX */
.form-box{
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* INPUT */
.form-control, .form-select{
    border-radius:10px;
}

/* ERROR */
.error{
    color:red;
    font-size:13px;
}

/* CARD EFFECT */
.form-box:hover{
    transform: translateY(-5px);
    transition:0.3s;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger px-3">

  <a class="navbar-brand fw-bold text-white" href="index.html">Mint To Be</a>

  <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    
    <ul class="navbar-nav ms-auto align-items-center">

      <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="contact.html">Contact</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="order.html">Order</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="variety.html">Variety</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="special-offer.html">Offers</a></li>

      <li class="nav-item ms-3">
        <div class="d-flex">
          <input type="text" id="searchBox" class="form-control form-control-sm me-2" placeholder="Search...">
          <button class="btn btn-light btn-sm">🔍</button>
        </div>
      </li>

      <li class="nav-item ms-3">
        <button class="btn btn-light position-relative" onclick="toggleCart()">
          🛒
          <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge bg-danger">0</span>
        </button>
      </li>

    </ul>
  </div>
</nav>

<section class="hero">
    <h1 class="fw-bold">Order Your Favorite Ice Cream</h1>
    <p>Fresh • Creamy • Delicious</p>
</section>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="form-box">

                <h4 class="text-center mb-3">Place Order</h4>

                <form onsubmit="return validateOrder()">

                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" id="name" class="form-control">
                        <div id="nameError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <label>Phone</label>
                        <input type="text" id="phone" class="form-control">
                        <div id="phoneError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <label>Ice Cream Type</label>
                        <select id="icecream" class="form-select">
                            <option value="">Select</option>
                            <option>Cone</option>
                            <option>Cup</option>
                            <option>Kulfi</option>
                            <option>Popsicle</option>
                        </select>
                        <div id="iceError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <label>Flavour</label>
                        <select id="flavour" class="form-select">
                            <option value="">Select</option>
                            <option>Chocolate</option>
                            <option>Vanilla</option>
                            <option>Strawberry</option>
                            <option>Mango</option>
                        </select>
                        <div id="flavourError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <label>Add Toppings</label><br>
                        <input type="checkbox" name="toppings"> Nuts<br>
                        <input type="checkbox" name="toppings"> Chocolate Syrup<br>
                        <input type="checkbox" name="toppings"> Sprinkles<br>
                        <input type="checkbox" name="toppings"> Cherry<br>
                        <div id="toppingError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <label>Quantity</label>
                        <input type="number" id="qty" class="form-control">
                        <div id="qtyError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <label>Address</label>
                        <textarea id="address" class="form-control"></textarea>
                        <div id="addressError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <input type="checkbox" id="terms">
                        <label>I agree to Terms & Conditions</label>
                        <div id="termsError" class="error"></div>
                    </div>

                    <button class="btn btn-danger w-100">Place Order</button>

                </form>

            </div>
        </div>
    </div>
</div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="form-box">

                <h4 class="text-center mb-3">Feedback</h4>

                <form onsubmit="return validateFeedback()">

                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" id="fname" class="form-control">
                        <div id="fnameError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <label>Rating</label><br>
                        <input type="radio" name="rating" value="1"> 1
                        <input type="radio" name="rating" value="2"> 2
                        <input type="radio" name="rating" value="3"> 3
                        <input type="radio" name="rating" value="4"> 4
                        <input type="radio" name="rating" value="5"> 5
                        <div id="ratingError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <label>Message</label>
                        <textarea id="message" class="form-control"></textarea>
                        <div id="messageError" class="error"></div>
                    </div>

                    <button class="btn btn-success w-100">Submit Feedback</button>

                </form>

            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 Mint To Be</p>
</footer>
<script>
let cartCount = 0;

function toggleCart() {
    alert("Cart items: " + cartCount);
}
function validateOrder() {
    let isValid = true;

    // Get values
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let ice = document.getElementById("icecream").value;
    let flavour = document.getElementById("flavour").value;
    let qty = document.getElementById("qty").value;
    let address = document.getElementById("address").value.trim();
    let terms = document.getElementById("terms").checked;

    let toppings = document.getElementsByName("toppings");
    let toppingSelected = false;

    toppings.forEach(t => {
        if (t.checked) toppingSelected = true;
    });

    document.querySelectorAll(".error").forEach(e => e.innerHTML = "");

    if (name === "") {
        document.getElementById("nameError").innerHTML = "Name required";
        isValid = false;
    }

    if (!/^[0-9]{10}$/.test(phone)) {
        document.getElementById("phoneError").innerHTML = "Enter valid 10-digit phone";
        isValid = false;
    }

    // Ice Cream
    if (ice === "") {
        document.getElementById("iceError").innerHTML = "Select type";
        isValid = false;
    }
    if (flavour === "") {
        document.getElementById("flavourError").innerHTML = "Select flavour";
        isValid = false;
    }
    if (!toppingSelected) {
        document.getElementById("toppingError").innerHTML = "Select at least one topping";
        isValid = false;
    }

    if (qty <= 0) {
        document.getElementById("qtyError").innerHTML = "Enter valid quantity";
        isValid = false;
    }

    if (address === "") {
        document.getElementById("addressError").innerHTML = "Address required";
        isValid = false;
    }

    if (!terms) {
        document.getElementById("termsError").innerHTML = "You must accept terms";
        isValid = false;
    }

    if (isValid) {
        cartCount += parseInt(qty);
        document.getElementById("cartCount").innerText = cartCount;
        alert("Order placed successfully!");
    }

    return isValid;
}

function validateFeedback() {
    let isValid = true;

    let name = document.getElementById("fname").value.trim();
    let message = document.getElementById("message").value.trim();
    let rating = document.querySelector('input[name="rating"]:checked');

    // Clear errors
    document.getElementById("fnameError").innerHTML = "";
    document.getElementById("ratingError").innerHTML = "";
    document.getElementById("messageError").innerHTML = "";

    // Name
    if (name === "") {
        document.getElementById("fnameError").innerHTML = "Name required";
        isValid = false;
    }

    // Rating
    if (!rating) {
        document.getElementById("ratingError").innerHTML = "Select rating";
        isValid = false;
    }

    // Message
    if (message === "") {
        document.getElementById("messageError").innerHTML = "Message required";
        isValid = false;
    }

    if (isValid) {
        alert("Feedback submitted successfully!");
    }

    return isValid;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
